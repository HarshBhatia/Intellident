[build]
  base = "apps/dashboard"
  command = "npm run build"
  # Let Netlify v5 runtime automatically configure the publish directory
  # No publish or plugins required for Next.js

[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NODE_VERSION = "20"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
