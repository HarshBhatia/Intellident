[build]
  base = "apps/dashboard"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NODE_VERSION = "20"
  NETLIFY_NEXT_SKEW_PROTECTION = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
